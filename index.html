<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftStream | AI Hashtag Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --glass: rgba(255, 255, 255, 0.03);
            --yt: #ff0000;
            --tk: #00f2ea;
            --ig: #e1306c;
            --accent: var(--yt);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Glow */
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
            transition: background 0.5s ease;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem 2rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 { font-size: 2.5rem; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .subtitle { font-size: 0.7rem; letter-spacing: 4px; opacity: 0.5; margin-bottom: 2rem; }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 100px;
            margin-bottom: 1.5rem;
        }

        .tab {
            flex: 1;
            padding: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 100px;
            transition: 0.3s;
            color: rgba(255,255,255,0.4);
        }

        .tab.active { background: var(--accent); color: white; }

        input {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 16px;
            margin-bottom: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .gen-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 20px;
            background: var(--accent);
            color: white;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }

        .gen-btn:active { transform: scale(0.98); }

        #resultBox {
            margin-top: 2rem;
            display: none;
            text-align: left;
            animation: fadeInUp 0.5s ease;
        }

        .hashtag-container {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 20px;
            font-family: monospace;
            color: var(--accent);
            word-wrap: break-word;
            border: 1px solid rgba(255,255,255,0.05);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="glow" id="bgGlow"></div>

<div class="container">
    <h1>SwiftStream</h1>
    <div class="subtitle">AI HASHTAG GENERATOR</div>

    <div class="tabs">
        <div class="tab active" data-p="youtube" onclick="setPlatform('youtube', '#ff0000')">YouTube</div>
        <div class="tab" data-p="tiktok" onclick="setPlatform('tiktok', '#00f2ea')">TikTok</div>
        <div class="tab" data-p="instagram" onclick="setPlatform('instagram', '#e1306c')">Instagram</div>
    </div>

    <input type="text" id="topicInput" placeholder="Enter video topic (e.g. Cooking, Gaming)...">
    <button class="gen-btn" id="mainBtn" onclick="generateHashtags()">Generate Viral Tags</button>

    <div id="resultBox">
        <p style="font-size: 12px; margin-bottom: 8px; opacity: 0.6;">AI RECOMMENDED TAGS:</p>
        <div class="hashtag-container" id="tagOutput">
            #loading #viral #trending...
        </div>
        <button class="gen-btn" style="margin-top: 10px; background: rgba(255,255,255,0.1); font-size: 12px; padding: 10px;" onclick="copyTags()">Copy to Clipboard</button>
    </div>
</div>

<script>
    let currentPlatform = 'youtube';
    const API_KEY = "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";

    function setPlatform(p, color) {
        currentPlatform = p;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`[data-p="${p}"]`).classList.add('active');
        
        document.documentElement.style.setProperty('--accent', color);
        document.getElementById('bgGlow').style.background = color;
    }

    async function generateHashtags() {
        const topic = document.getElementById('topicInput').value;
        const btn = document.getElementById('mainBtn');
        const output = document.getElementById('tagOutput');
        const box = document.getElementById('resultBox');

        if (!topic) return alert("Please enter a topic!");

        btn.innerText = "AI is thinking...";
        btn.disabled = true;
        box.style.display = "block";
        output.innerText = "Analyzing trends...";

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "google/gemini-2.0-flash-lite-001",
                    "messages": [
                        {
                            "role": "user", 
                            "content": `Generate 20 high-traffic, viral hashtags for a ${currentPlatform} video about: ${topic}. Only provide the hashtags separated by spaces.`
                        }
                    ]
                })
            });

            const data = await response.json();
            const tags = data.choices[0].message.content;

            output.innerText = tags;
            btn.innerText = "Generate Viral Tags";
            btn.disabled = false;

        } catch (error) {
            output.innerText = "Error connecting to AI. Please check your API key.";
            btn.disabled = false;
            btn.innerText = "Try Again";
        }
    }

    function copyTags() {
        const text = document.getElementById('tagOutput').innerText;
        navigator.clipboard.writeText(text);
        alert("Hashtags copied!");
    }
</script>

</body>
</html>
